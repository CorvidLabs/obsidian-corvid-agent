name: Checks

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    name: Lint, Type Check & Spec Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: node esbuild.config.mjs production

      - name: Type check
        run: bun x tsc --noEmit

      - name: Spec validation (strict)
        uses: CorvidLabs/spec-sync@v4.2.0
        with:
          strict: 'true'
          comment: 'false'
