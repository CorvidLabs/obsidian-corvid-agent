name: Checks

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "specs/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "esbuild.config.mjs"
      - "manifest.json"
      - ".github/workflows/checks.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "specs/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "esbuild.config.mjs"
      - "manifest.json"
      - ".github/workflows/checks.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Type Check & Spec Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: node esbuild.config.mjs production

      - name: Type check
        run: bun x tsc --noEmit
